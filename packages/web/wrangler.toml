name = "solid-glass-web"
compatibility_date = "2024-12-01"
pages_build_output_dir = "dist"

[build]
command = "pnpm install && pnpm --filter solid-glass build && pnpm --filter @solid-glass/web build"
cwd = "../.."

# SPA fallback — all routes serve index.html
[[redirects]]
from = "/*"
to = "/index.html"
status = 200
